- name: Deploy Hospital App
  hosts: app-server
  become: yes

  vars:
    image_name: supritambig/hospital-app
    tag: "{{ tag }}"
    container_name: hospital-app
    port: 8080

  tasks:

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Remove old container
      docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Run new container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}:{{ tag }}"
        state: started
        ports:
          - "{{ port }}:8080"