- name: Deploy Hospital App
  hosts: app_server
  become: yes

  vars:
    image_name: suprit43/hp_webapp
    tag: "{{ tag }}"
    container_name: hospital-app
    db_container: mysql-db
    network_name: hospital-net
    app_port: 8085

  tasks:

    # 🔹 Create Docker Network
    - name: Create Docker network
      community.docker.docker_network:
        name: "{{ network_name }}"

    # 🔹 Remove old MySQL container (optional but avoids conflicts)
    - name: Remove old MySQL container
      community.docker.docker_container:
        name: "{{ db_container }}"
        state: absent

    # 🔹 Run MySQL Container
    - name: Run MySQL container
      community.docker.docker_container:
        name: "{{ db_container }}"
        image: mysql:8
        state: started
        restart_policy: always
        networks:
          - name: "{{ network_name }}"
        env:
          MYSQL_ROOT_PASSWORD: "1234"
          MYSQL_DATABASE: "hospitaldb"
          MYSQL_ROOT_HOST: "%"   # 🔥 IMPORTANT FIX
        ports:
          - "3306:3306"

    # 🔹 Wait for MySQL to be ready
    - name: Wait for MySQL to be ready
      shell: |
        until docker exec {{ db_container }} mysqladmin ping -h "localhost" --silent; do
          sleep 5
        done

    # 🔹 Remove old app container
    - name: Remove old container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent

    # 🔹 Run Application Container
    - name: Run new container
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}:{{ tag }}"
        state: started
        pull: yes
        restart_policy: always
        networks:
          - name: "{{ network_name }}"
        ports:
          - "{{ app_port }}:8085"