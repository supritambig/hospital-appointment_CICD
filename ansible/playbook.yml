tasks:
  - name: Ensure Docker is running
    service:
      name: docker
      state: started
      enabled: true

  - name: Pull latest Docker image
    community.docker.docker_image:
      name: "{{ image_name }}"
      source: pull

  - name: Remove old container
    community.docker.docker_container:
      name: "{{ container_name }}"
      state: absent

  - name: Run container
    community.docker.docker_container:
      name: "{{ container_name }}"
      image: "{{ image_name }}"
      state: started
      restart_policy: always
      ports:
        - "{{ host_port }}:{{ app_port }}"